publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
